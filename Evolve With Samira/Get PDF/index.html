<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Me | Samira Otung</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="/images/Evolve Transparent-White.png" type="image/x-icon">
</head>
<body>
  <section class="booking-section">
    <div class="form-wrapper">
      <h1>Register to Download the 5 Confidence Secrets</h1>
      <p>Fill out the form below to receive your free copy of the 5 Confidence Secrets.</p>

       <div class="container">
    <form id="bookingForm">
      <!-- Hidden Inputs -->
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_subject" value="New Booking Request!" />

      <!-- Full Name -->
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" />
      </div>

      

      <!-- Message -->
       <div class="vh">
      <div class="form-group">
        <label for="message">Your interests</label>
        <textarea id="message" name="message" rows="5" placeholder="Tell us more about your interests..."></textarea>
      </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn">Send</button>

      <!-- Status Message -->   
      <div id="statusMessage" class="message"></div>
    </form>
  </div>
  </section>
 <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</body>
 <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("oc4vk3E1OUMb-pZlZ");
})();

const form = document.getElementById("bookingForm");
const statusMsg = document.getElementById("statusMessage");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  const templateParams = {
    name: formData.get("name"),
    email: formData.get("email"),
    phone: formData.get("phone"),
    message: formData.get("message"),
    to_email: formData.get("email")
  };

  try {

    // Send form to you
    await fetch("https://formsubmit.co/ajax/moradeyovictor@gmail.com", {
      method: "POST",
      headers: { "Accept": "application/json" },
      body: formData
    });

    // Send confirmation email to the user
    await emailjs.send(
      "service_j0j9ptf",
      "template_edhnmrg",
      templateParams
    );

    // Show success message
    statusMsg.textContent = "✅ Registration successful! Your PDF will begin the download shortly.";
    statusMsg.className = "message success";
    statusMsg.style.display = "block";

    form.reset();

    // Delay before download (2 seconds)
    setTimeout(function() {

      const downloadLink = document.createElement("a");
      downloadLink.href = "/Get PDF/EVOLE YOU SOLUTIONS.pdf"; 
      downloadLink.download = "EVOLE YOU SOLUTIONS.pdf";

      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);

    }, 2000);

  } catch (error) {

    console.error(error);

    statusMsg.textContent = "❌ Failed to send. Please try again.";
    statusMsg.className = "message error";
    statusMsg.style.display = "block";

  }
});

</script>
  </html>
