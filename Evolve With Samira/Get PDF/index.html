<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Me | Samira Otung</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="/images/Evolve Transparent-White.png" type="image/x-icon">
</head>
<body>
  <section class="booking-section">
    <div class="form-wrapper">
      <h1>Register to Download the 5 Confidence Secrets</h1>
      <p>Fill out the form below to receive your free copy of the 5 Confidence Secrets.</p>

       <div class="container">
    <form id="bookingForm">
      <!-- Hidden Inputs -->
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_subject" value="New Booking Request!" />

      <!-- Full Name -->
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" />
      </div>

      

      <!-- Message -->
       <div class="vh">
      <div class="form-group">
        <label for="message">Your interests</label>
        <textarea id="message" name="message" rows="5" placeholder="Tell us more about your interests..."></textarea>
      </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn">Send</button>

      <!-- Status Message -->   
      <div id="statusMessage" class="message"></div>
    </form>
  </div>
  </section>
</body>
 <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("Tl3e6W8oFsEye18-h");
})();

const form = document.getElementById("bookingForm");
const statusMsg = document.getElementById("statusMessage");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  const templateParams = {
    name: formData.get("name"),
    email: formData.get("email"),
    phone: formData.get("phone"),
    message: formData.get("message"),
    to_email: "moradeyovictor@gmail.com"  // ✅ Fixed: send TO your inbox, not the user's email
  };

  try {
    // Send to FormSubmit
    const formSubmitRes = await fetch("https://formsubmit.co/ajax/moradeyovictor@gmail.com", {
      method: "POST",
      headers: { "Accept": "application/json" },
      body: formData
    });

    if (!formSubmitRes.ok) {
      console.warn("FormSubmit failed, continuing anyway...");
    }

    // Send via EmailJS
    await emailjs.send(
      "service_haf3a3r",
      "template_stiqomq",
      templateParams
    );

    statusMsg.textContent = "✅ Success! Download starting...";
    statusMsg.className = "message success";
    statusMsg.style.display = "block";

    form.reset();

    setTimeout(() => {
      const link = document.createElement("a");
      link.href = "/get-pdf/evolve-you-solutions.pdf";  // ✅ Fixed typo: "evolve" not "evole"
      link.download = "evolve-you-solutions.pdf";        // ✅ Fixed: explicit filename forces download
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }, 1500);

  } catch (error) {
    console.error("Submission error:", error);

    statusMsg.textContent = "❌ Something went wrong. Please try again.";
    statusMsg.className = "message error";
    statusMsg.style.display = "block";
  }
});
</script>
  </html>
